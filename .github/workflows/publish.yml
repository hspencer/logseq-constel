name: Build plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p release
          cp manifest.json package.json icon.svg LICENSE README.md release/ 2>/dev/null || true
          cp -r dist release/dist
          cd release && zip -r ../logseq-constel.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: logseq-constel.zip
          generate_release_notes: true
